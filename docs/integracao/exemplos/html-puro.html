<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Exemplo MK-CRM — HTML puro</title>

  <!-- ============ MK Tracker (carrega ANTES do forms) ============ -->
  <script async
    src="https://hrbhmqckzjxjbhpzpqeo.supabase.co/functions/v1/tracking-pixel?project_id=SEU_PROJECT_ID">
  </script>

  <!-- ============ MK Forms ============ -->
  <script async
    src="https://hrbhmqckzjxjbhpzpqeo.supabase.co/functions/v1/forms-snippet?token=SEU_TOKEN_PUBLICO">
  </script>

  <!-- ============ Fila pré-load (opcional) ============ -->
  <script>
    window.MK = window.MK || { _q: [] };
    ["track","identify","page"].forEach(function(m){
      window.MK[m] = window.MK[m] || function(){ window.MK._q.push([m, arguments]); };
    });
  </script>
</head>

<body>
  <h1>Agende sua consulta</h1>

  <!-- Form simples: o snippet captura sozinho -->
  <form
    data-mk-form="contato-home"
    data-mk-name="Form de contato (home)"
    data-mk-redirect="/obrigado"
    action="/api/legacy" method="POST">

    <label>Nome
      <input type="text" name="nome" required>
    </label>

    <label>E-mail
      <input type="email" name="email" required>
    </label>

    <label>WhatsApp
      <input type="tel" name="whatsapp" required>
    </label>

    <label>Mensagem
      <textarea name="mensagem"></textarea>
    </label>

    <!-- Campo escondido pra rastrear variante -->
    <input type="hidden" name="variant" value="A">

    <button type="submit">Enviar</button>
  </form>

  <!-- CTA com tracking declarativo -->
  <a href="https://wa.me/5511999998888"
     data-mk-track="clicou_whatsapp"
     data-mk-props='{"local":"footer"}'>
    Falar no WhatsApp
  </a>

  <!-- Tracking custom via JS -->
  <script>
    document.querySelector("button.cta-secundario")?.addEventListener("click", function(){
      window.MK?.track("clicou_cta_secundario", {
        page: location.pathname,
      });
    });
  </script>
</body>
</html>
